name: Update icon descriptions

on:
  push:
    branches: [main]
    paths:
      - 'designs_wip/icons/*.svg'

jobs:
  update-descriptions:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate missing descriptions
        run: python .github/scripts/update_descriptions.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit updated DESCRIPTIONS.md
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add designs_wip/icons/DESCRIPTIONS.md
          git diff --staged --quiet && echo "No changes to commit." || \
            git commit -m "chore: auto-generate descriptions for new icons [skip ci]" && \
            git push
